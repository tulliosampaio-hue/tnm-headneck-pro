<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNM H&N PRO</title>
<style>
body{font-family:Arial;background:#eef2f6;padding:15px;color:#111}
h2{font-size:28px}
.card{background:#fff;padding:15px;border-radius:14px;margin-bottom:12px}
select,button{width:100%;padding:11px;margin-top:6px;border-radius:9px;border:1px solid #ccc;font-size:16px}
button{background:#0b4f7a;color:#fff;font-weight:bold}
.result{background:#d9edf7;padding:15px;border-radius:12px;margin-top:12px;line-height:1.35}
label{display:block;margin-top:10px;font-weight:bold}
.bad{color:#b00020;font-weight:bold}
.small{font-size:13px;color:#444}
</style>
</head>
<body>

<h2>TNM Cabeça e Pescoço PRO</h2>

<div class="card">
<label>Sítio tumoral</label>
<select id="site" onchange="updateOptions()">
<option value="oral">Cavidade oral</option>
<option value="orofaringe_hpv">Orofaringe HPV+</option>
<option value="orofaringe_neg">Orofaringe HPV−</option>
<option value="hipofaringe">Hipofaringe</option>
<option value="glotica">Laringe glótica</option>
<option value="supraglotica">Laringe supraglótica</option>
<option value="tireoide">Tireoide</option>
<option value="melanoma">Melanoma cutâneo</option>
<option value="pele">Câncer de pele não melanoma</option>
</select>

<div id="boxSubtipo" style="display:none;">
<label>Subtipo tireoide</label>
<select id="subtipo" onchange="calc()">
<option value="dif">Papilífero/Folicular</option>
<option value="med">Medular</option>
<option value="ana">Anaplásico</option>
</select>
</div>

<label>T</label>
<select id="T" onchange="calc()"></select>

<label>N</label>
<select id="N" onchange="calc()"></select>

<label>M</label>
<select id="M" onchange="calc()">
<option value="M0">M0</option>
<option value="M1">M1</option>
</select>

<label>ENE</label>
<select id="ENE" onchange="calc()">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<label>Margem</label>
<select id="margem" onchange="calc()">
<option value="livre">Livre</option>
<option value="proxima">Próxima</option>
<option value="positiva">Positiva</option>
</select>

<button onclick="calc()">Calcular</button>
<button onclick="copiar()">Copiar para prontuário</button>

<div class="result" id="res"></div>
</div>

<script>
function el(id){return document.getElementById(id);}

const dados={
oral:{
nome:"CEC Cavidade Oral",
T:{
T1:"≤2 cm e DOI ≤5 mm",
T2:"≤2 cm com DOI 5–10 mm OU 2–4 cm com DOI ≤10 mm",
T3:">4 cm OU DOI >10 mm",
T4a:"Invade cortical óssea, seio maxilar, pele ou musculatura profunda",
T4b:"Invade espaço mastigador, placas pterigoides, base do crânio ou envolve carótida"
},
N:{
N0:"Sem linfonodo regional",
N1:"Único ipsilateral ≤3 cm, ENE−",
N2a:"Único ipsilateral >3–6 cm, ENE−",
N2b:"Múltiplos ipsilaterais ≤6 cm, ENE−",
N2c:"Bilateral/contralateral ≤6 cm, ENE−",
N3:"Linfonodo >6 cm ou ENE+"
}
},

orofaringe_hpv:{
nome:"CEC Orofaringe HPV+ / p16+",
T:{
T0:"Primário oculto",
T1:"≤2 cm",
T2:">2–4 cm",
T3:">4 cm ou extensão à superfície lingual da epiglote",
T4:"Invade laringe, musculatura extrínseca da língua, palato duro, mandíbula ou além"
},
N:{
N0:"Sem linfonodo",
N1:"Linfonodos ipsilaterais, nenhum >6 cm",
N2:"Linfonodos bilaterais/contralaterais, nenhum >6 cm",
N3:"Linfonodo >6 cm"
}
},

orofaringe_neg:{
nome:"CEC Orofaringe HPV− / p16−",
T:{
T1:"≤2 cm",
T2:">2–4 cm",
T3:">4 cm ou extensão à superfície lingual da epiglote",
T4a:"Invade laringe, músculo extrínseco da língua, palato duro ou mandíbula",
T4b:"Invade pterigoide lateral, placas pterigoides, nasofaringe lateral, base do crânio ou carótida"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm, ENE−",
N2a:"Único ipsilateral >3–6 cm, ENE−",
N2b:"Múltiplos ipsilaterais ≤6 cm, ENE−",
N2c:"Bilateral/contralateral ≤6 cm, ENE−",
N3:"Linfonodo >6 cm ou ENE+"
}
},

hipofaringe:{
nome:"CEC Hipofaringe",
T:{
T1:"Limitado a um subsítio da hipofaringe e/ou ≤2 cm",
T2:"Mais de um subsítio ou 2–4 cm, sem fixação da hemilaringe",
T3:">4 cm ou fixação da hemilaringe ou extensão ao esôfago",
T4a:"Invade cartilagem tireoide/cricoide, hioide, tireoide, esôfago ou partes moles centrais",
T4b:"Invade fáscia pré-vertebral, carótida ou estruturas mediastinais"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2a:"Único ipsilateral >3–6 cm",
N2b:"Múltiplos ipsilaterais ≤6 cm",
N2c:"Bilateral/contralateral ≤6 cm",
N3:"Linfonodo >6 cm ou ENE+"
}
},

glotica:{
nome:"CEC Laringe Glótica",
T:{
T1:"Limitado às cordas vocais, mobilidade normal",
T2:"Extensão supra/subglótica e/ou mobilidade reduzida",
T3:"Fixação da corda vocal e/ou invasão do espaço paraglótico/cortical interna da cartilagem tireoide",
T4a:"Invade através da cartilagem tireoide ou tecidos extralaríngeos",
T4b:"Invade espaço pré-vertebral, mediastino ou envolve carótida"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2a:"Único ipsilateral >3–6 cm",
N2b:"Múltiplos ipsilaterais ≤6 cm",
N2c:"Bilateral/contralateral ≤6 cm",
N3:"Linfonodo >6 cm ou ENE+"
}
},

supraglotica:{
nome:"CEC Laringe Supraglótica",
T:{
T1:"Limitado a um subsítio supraglótico, mobilidade normal",
T2:"Mais de um subsítio ou região adjacente, mobilidade preservada",
T3:"Fixação de corda vocal ou invasão pré-epiglótica/paraglótica/cortical interna",
T4a:"Invade através da cartilagem tireoide ou tecidos extralaríngeos",
T4b:"Invade espaço pré-vertebral, mediastino ou envolve carótida"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2a:"Único ipsilateral >3–6 cm",
N2b:"Múltiplos ipsilaterais ≤6 cm",
N2c:"Bilateral/contralateral ≤6 cm",
N3:"Linfonodo >6 cm ou ENE+"
}
},

tireoide:{
nome:"Tumor de Tireoide",
T:{
T1:"≤2 cm limitado à tireoide",
T2:">2–4 cm limitado à tireoide",
T3:">4 cm limitado à tireoide ou extensão extratireoidiana mínima",
T4a:"Extensão macroscópica para laringe, traqueia, esôfago ou nervo recorrente",
T4b:"Invade fáscia pré-vertebral ou envolve carótida/vasos mediastinais"
},
N:{
N0:"Sem linfonodo",
N1a:"Linfonodos centrais VI/VII",
N1b:"Linfonodos laterais cervicais ou mediastinais superiores"
}
},

melanoma:{
nome:"Melanoma Cutâneo",
T:{
T1:"Breslow ≤1,0 mm",
T2:"Breslow >1,0–2,0 mm",
T3:"Breslow >2,0–4,0 mm",
T4:"Breslow >4,0 mm"
},
N:{
N0:"Sem linfonodo",
N1:"1 linfonodo ou microssatélite/satélite/in-transit sem linfonodo",
N2:"2–3 linfonodos ou satélite/in-transit com 1 linfonodo",
N3:"≥4 linfonodos ou conglomerado linfonodal"
}
},

pele:{
nome:"Câncer de Pele Não Melanoma",
T:{
T1:"≤2 cm sem critérios de alto risco",
T2:">2–4 cm ou alto risco local",
T3:">4 cm, invasão profunda/perineural ou erosão óssea menor",
T4:"Invasão óssea extensa, base do crânio ou forame"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2:"Múltiplos, contralateral/bilateral ou 3–6 cm",
N3:">6 cm ou ENE+"
}
}
};

function updateOptions(){
let s=el("site").value;
let tSelect=el("T");
let nSelect=el("N");

el("boxSubtipo").style.display=(s==="tireoide")?"block":"none";

tSelect.innerHTML="";
nSelect.innerHTML="";

Object.keys(dados[s].T).forEach(function(t){
let opt=document.createElement("option");
opt.value=t;
opt.textContent=t+" - "+dados[s].T[t];
tSelect.appendChild(opt);
});

Object.keys(dados[s].N).forEach(function(n){
let opt=document.createElement("option");
opt.value=n;
opt.textContent=n+" - "+dados[s].N[n];
nSelect.appendChild(opt);
});

calc();
}

function isN2(n){
return n==="N2"||n==="N2a"||n==="N2b"||n==="N2c";
}

function calcularEstagio(s,t,n,m){
if(m==="M1") return (s==="melanoma"||s==="orofaringe_hpv")?"IV":"IVC";

if(s==="orofaringe_hpv"){
if(t==="T4"||n==="N3") return "III";
if(t==="T3"||n==="N2") return "II";
return "I";
}

if(s==="melanoma"){
if(n!=="N0") return "III";
if(t==="T3"||t==="T4") return "II";
return "I";
}

if(s==="tireoide"){
if(t==="T4b") return "IVA/IVB";
if(t==="T4a") return "III/IVA";
if(t==="T3"||n!=="N0") return "II";
return "I";
}

if(t==="T4b"||n==="N3") return "IVB";
if(t==="T4a"||t==="T4"||isN2(n)) return "IVA";
if(t==="T3"||n==="N1") return "III";
if(t==="T2") return "II";
return "I";
}

function conduta(s,estagio,subtipo){
if(s==="tireoide"){
if(subtipo==="dif") return "ATA/NCCN: estratificar risco. Baixo risco: lobectomia pode ser suficiente. Intermediário/alto risco: tireoidectomia total ± radioiodo e supressão de TSH.";
if(subtipo==="med") return "Medular: tireoidectomia total + esvaziamento central; avaliar calcitonina, CEA e RET.";
return "Anaplásico: urgência oncológica; NGS/BRAF, terapia-alvo/imunoterapia/RT; cirurgia apenas se ressecável e útil para controle local.";
}

if(s==="melanoma"){
if(estagio==="I") return "Excisão ampla; considerar linfonodo sentinela conforme Breslow/ulceração.";
if(estagio==="II") return "Excisão ampla + considerar linfonodo sentinela; avaliar adjuvância em alto risco.";
if(estagio==="III") return "Doença regional: estadiamento por imagem, cirurgia seletiva e imunoterapia/terapia-alvo adjuvante conforme mutação.";
return "Metastático: imunoterapia anti-PD-1 ± anti-CTLA-4 ou BRAF/MEK se mutado.";
}

if(s==="pele"){
if(estagio==="I"||estagio==="II") return "Exérese com margem adequada ou Mohs. Alto risco: considerar radioterapia adjuvante.";
if(estagio==="III") return "Doença regional: cirurgia/esvaziamento quando indicado + RT. CEC avançado: anti-PD-1.";
return "Avançado/metastático: CEC anti-PD-1; CBC avançado: inibidor Hedgehog ou anti-PD-1 conforme cenário.";
}

if(estagio==="I"||estagio==="II") return "Tratamento local: cirurgia ou radioterapia conforme sítio, função e ressecabilidade.";
if(estagio==="III"||estagio==="IVA") return "Doença localmente avançada: cirurgia + adjuvância ou QT/RT definitiva conforme sítio e objetivo funcional.";
if(estagio==="IVB") return "Muito avançado: avaliar ressecabilidade; QT/RT definitiva ou terapia sistêmica se irressecável.";
return "Metastático: terapia sistêmica/imunoterapia ± quimioterapia e cuidados paliativos integrados.";
}

function calc(){
let s=el("site").value;
let t=el("T").value;
let n=el("N").value;
let m=el("M").value;
let subtipo=el("subtipo").value;
let ene=el("ENE").value;
let margem=el("margem").value;

let estagio=calcularEstagio(s,t,n,m);
let plano=conduta(s,estagio,subtipo);

let alerta="";
if(ene==="sim"||margem==="positiva"){
alerta="<br><br><span class='bad'>⚠ Alto risco: ENE positivo ou margem positiva → considerar QT/RT adjuvante.</span>";
}
else if(margem==="proxima"){
alerta="<br><br><span class='bad'>⚠ Margem próxima: considerar RT adjuvante conforme contexto.</span>";
}

el("res").innerHTML=
"<b>"+dados[s].nome+"</b><br><br>"+
"<b>TNM:</b> "+t+" "+n+" "+m+"<br>"+
"<b>Estágio:</b> "+estagio+"<br><br>"+
"<b>O que caracteriza o T:</b><br>"+dados[s].T[t]+"<br><br>"+
"<b>O que caracteriza o N:</b><br>"+dados[s].N[n]+"<br><br>"+
"<b>Conduta sugerida:</b><br>"+plano+
alerta+
"<p class='small'>Base operacional: AJCC + NCCN + ATA. Ferramenta de apoio; confirmar com guideline oficial, imagem, anatomopatológico, performance status e discussão multidisciplinar.</p>";
}

function copiar(){
calc();
navigator.clipboard.writeText(el("res").innerText);
alert("Copiado para prontuário!");
}

updateOptions();
</script>
</body>
</html>

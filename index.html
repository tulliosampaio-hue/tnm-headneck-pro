<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNM H&N PRO</title>

<style>
body{font-family:Arial;background:#eef2f6;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px}
select,button{width:100%;padding:10px;margin-top:6px;border-radius:8px}
.result{background:#d9edf7;padding:15px;border-radius:10px}
.small{font-size:13px;color:#444}
.bad{color:#b00020;font-weight:bold}
</style>
</head>

<body>

<h2>TNM Cabeça e Pescoço PRO</h2>

<div class="card">
<label>Sítio tumoral</label>
<select id="site" onchange="updateOptions()">
<option value="oral">Cavidade oral</option>
<option value="orofaringe_hpv">Orofaringe HPV+</option>
<option value="orofaringe_neg">Orofaringe HPV−</option>
<option value="hipofaringe">Hipofaringe</option>
<option value="glotica">Laringe glótica</option>
<option value="supraglotica">Laringe supraglótica</option>
<option value="tireoide">Tireoide</option>
</select>

<label>Subtipo (tireoide)</label>
<select id="subtipo">
<option value="dif">Papilífero/Folicular</option>
<option value="med">Medular</option>
<option value="ana">Anaplásico</option>
</select>

<label>T</label>
<select id="T"></select>

<label>N</label>
<select id="N"></select>

<label>M</label>
<select id="M">
<option value="M0">M0</option>
<option value="M1">M1</option>
</select>

<label>ENE</label>
<select id="ENE">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<label>Margem</label>
<select id="margem">
<option value="livre">Livre</option>
<option value="proxima">Próxima</option>
<option value="positiva">Positiva</option>
</select>

<button onclick="calc()">Calcular</button>
<button onclick="copiar()">Copiar para prontuário</button>

</div>

<div class="result" id="res"></div>

<script>

const dados = {

oral:{
nome:"CEC Cavidade Oral",
T:{T1:"≤2 cm",T2:"≤4 cm",T3:">4 cm",T4:"Invasivo"},
N:{N0:"Sem linfonodo",N1:"≤3 cm",N2:"Até 6 cm",N3:">6 cm"}
},

orofaringe_hpv:{
nome:"Orofaringe HPV+",
T:{T1:"≤2 cm",T2:"≤4 cm",T3:">4 cm",T4:"Invasivo"},
N:{N0:"Sem linfonodo",N1:"Ipsilateral",N2:"Bilateral",N3:">6 cm"}
},

orofaringe_neg:{
nome:"Orofaringe HPV−",
T:{T1:"≤2 cm",T2:"≤4 cm",T3:">4 cm",T4:"Invasivo"},
N:{N0:"Sem linfonodo",N1:"≤3 cm",N2:"Até 6 cm",N3:">6 cm"}
},

hipofaringe:{
nome:"Hipofaringe",
T:{T1:"Pequeno",T2:"Local",T3:"Fixação",T4:"Extenso"},
N:{N0:"Sem linfonodo",N1:"≤3 cm",N2:"Até 6 cm",N3:">6 cm"}
},

glotica:{
nome:"Laringe Glótica",
T:{T1:"Limitado",T2:"Extensão",T3:"Fixação",T4:"Invasivo"},
N:{N0:"Sem linfonodo",N1:"≤3 cm",N2:"Até 6 cm",N3:">6 cm"}
},

supraglotica:{
nome:"Laringe Supraglótica",
T:{T1:"Local",T2:"Extensão",T3:"Fixação",T4:"Invasivo"},
N:{N0:"Sem linfonodo",N1:"≤3 cm",N2:"Até 6 cm",N3:">6 cm"}
},

tireoide:{
nome:"Tireoide",
T:{T1:"≤2 cm",T2:"2–4 cm",T3:">4 cm",T4:"Extenso"},
N:{N0:"Sem linfonodo",N1a:"Central",N1b:"Lateral"}
}

};

function updateOptions(){
let s=site.value;
T.innerHTML="";
N.innerHTML="";
for(let t in dados[s].T){T.innerHTML+=`<option>${t}</option>`}
for(let n in dados[s].N){N.innerHTML+=`<option>${n}</option>`}
}

function calc(){

let s=site.value;
let t=T.value;
let n=N.value;
let m=M.value;
let subt=subtipo.value;

let estagio="I";

if(m==="M1"){estagio="IV"}
else if(s==="orofaringe_hpv"){
if(t==="T4"||n==="N3") estagio="III"
else if(t==="T3"||n==="N2") estagio="II"
}
else{
if(t==="T4"||n==="N3") estagio="IV"
else if(t==="T3"||n==="N2") estagio="III"
else if(t==="T2") estagio="II"
}

let conduta="";

if(s==="tireoide"){
if(subt==="dif") conduta="ATA: cirurgia ± radioiodo conforme risco"
if(subt==="med") conduta="Total + esvaziamento central"
if(subt==="ana") conduta="NGS + terapia alvo"
}
else{
if(estagio==="I"||estagio==="II") conduta="Cirurgia ou RT"
else if(estagio==="III") conduta="Cirurgia + adjuvância"
else conduta="QT/RT ou sistêmico"
}

res.innerHTML=
"<b>"+dados[s].nome+"</b><br><br>"+
"<b>Estágio:</b> "+estagio+"<br><br>"+
"<b>Conduta:</b><br>"+conduta
}

function copiar(){
navigator.clipboard.writeText(res.innerText)
alert("Copiado!")
}

updateOptions();

</script>

</body>
</html>

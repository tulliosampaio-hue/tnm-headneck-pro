<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNM Cabeça e Pescoço PRO</title>

<style>
body{font-family:Arial;background:#eef2f6;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px}
select,button{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ccc;font-size:16px}
.result{background:#d9edf7;padding:15px;border-radius:10px;margin-top:10px}
.small{font-size:13px;color:#444}
.bad{color:#b00020;font-weight:bold}
h2{margin-bottom:10px}
label{display:block;margin-top:10px;font-weight:bold}
</style>
</head>

<body>

<h2>TNM Cabeça e Pescoço PRO</h2>

<div class="card">

<label>Sítio tumoral</label>
<select id="site" onchange="updateOptions()">
<option value="oral">Cavidade oral</option>
<option value="orofaringe_hpv">Orofaringe HPV+</option>
<option value="orofaringe_neg">Orofaringe HPV−</option>
<option value="hipofaringe">Hipofaringe</option>
<option value="glotica">Laringe glótica</option>
<option value="supraglotica">Laringe supraglótica</option>
<option value="tireoide">Tireoide</option>
</select>

<div id="boxSubtipo" style="display:none;">
<label>Subtipo da tireoide</label>
<select id="subtipo" onchange="calc()">
<option value="dif">Papilífero/Folicular</option>
<option value="med">Medular</option>
<option value="ana">Anaplásico</option>
</select>
</div>

<label>T</label>
<select id="T" onchange="calc()"></select>

<label>N</label>
<select id="N" onchange="calc()"></select>

<label>M</label>
<select id="M" onchange="calc()">
<option value="M0">M0</option>
<option value="M1">M1</option>
</select>

<label>ENE</label>
<select id="ENE" onchange="calc()">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<label>Margem</label>
<select id="margem" onchange="calc()">
<option value="livre">Livre</option>
<option value="proxima">Próxima</option>
<option value="positiva">Positiva</option>
</select>

<button onclick="calc()">Calcular</button>
<button onclick="copiar()">Copiar para prontuário</button>

<div class="result" id="res"></div>

</div>

<script>
function el(id){
return document.getElementById(id);
}

const dados = {

oral:{
nome:"CEC Cavidade Oral",
T:{
T1:"≤2 cm e DOI ≤5 mm",
T2:"2–4 cm ou DOI 5–10 mm",
T3:">4 cm ou DOI >10 mm",
T4:"Invasão local avançada"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2:"Múltiplos linfonodos ou linfonodo até 6 cm",
N3:">6 cm ou ENE positivo"
}
},

orofaringe_hpv:{
nome:"CEC Orofaringe HPV+ / p16+",
T:{
T1:"≤2 cm",
T2:"2–4 cm",
T3:">4 cm",
T4:"Invasão de estruturas profundas"
},
N:{
N0:"Sem linfonodo",
N1:"Linfonodos ipsilaterais, nenhum >6 cm",
N2:"Linfonodos bilaterais/contralaterais, nenhum >6 cm",
N3:"Linfonodo >6 cm"
}
},

orofaringe_neg:{
nome:"CEC Orofaringe HPV− / p16−",
T:{
T1:"≤2 cm",
T2:"2–4 cm",
T3:">4 cm",
T4:"Invasão de estruturas profundas"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2:"Linfonodo 3–6 cm, múltiplos ou bilateral/contralateral",
N3:">6 cm ou ENE positivo"
}
},

hipofaringe:{
nome:"CEC Hipofaringe",
T:{
T1:"Limitado a um subsítio e/ou ≤2 cm",
T2:"Mais de um subsítio ou 2–4 cm",
T3:">4 cm ou fixação da hemilaringe",
T4:"Invasão extensa de estruturas adjacentes"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2:"Linfonodo 3–6 cm, múltiplos ou bilateral/contralateral",
N3:">6 cm ou ENE positivo"
}
},

glotica:{
nome:"CEC Laringe Glótica",
T:{
T1:"Limitado às cordas vocais, mobilidade normal",
T2:"Extensão supra/subglótica ou mobilidade reduzida",
T3:"Fixação da corda vocal ou invasão do espaço paraglótico",
T4:"Invasão extralaríngea"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2:"Linfonodo 3–6 cm, múltiplos ou bilateral/contralateral",
N3:">6 cm ou ENE positivo"
}
},

supraglotica:{
nome:"CEC Laringe Supraglótica",
T:{
T1:"Limitado a um subsítio supraglótico, mobilidade normal",
T2:"Mais de um subsítio ou região adjacente, mobilidade preservada",
T3:"Fixação de corda vocal ou invasão pré-epiglótica/paraglótica",
T4:"Invasão extralaríngea"
},
N:{
N0:"Sem linfonodo",
N1:"Único ipsilateral ≤3 cm",
N2:"Linfonodo 3–6 cm, múltiplos ou bilateral/contralateral",
N3:">6 cm ou ENE positivo"
}
},

tireoide:{
nome:"Tumor de Tireoide",
T:{
T1:"≤2 cm limitado à tireoide",
T2:"2–4 cm limitado à tireoide",
T3:">4 cm ou extensão extratireoidiana mínima",
T4:"Extensão extratireoidiana macroscópica"
},
N:{
N0:"Sem linfonodo",
N1a:"Linfonodos centrais",
N1b:"Linfonodos laterais cervicais ou mediastinais"
}
}

};

function updateOptions(){
let s = el("site").value;
let tSelect = el("T");
let nSelect = el("N");

if(s === "tireoide"){
el("boxSubtipo").style.display = "block";
} else {
el("boxSubtipo").style.display = "none";
}

tSelect.innerHTML = "";
nSelect.innerHTML = "";

Object.keys(dados[s].T).forEach(function(t){
let opt = document.createElement("option");
opt.value = t;
opt.textContent = t + " - " + dados[s].T[t];
tSelect.appendChild(opt);
});

Object.keys(dados[s].N).forEach(function(n){
let opt = document.createElement("option");
opt.value = n;
opt.textContent = n + " - " + dados[s].N[n];
nSelect.appendChild(opt);
});

calc();
}

function calcularEstagio(s,t,n,m){
let estagio = "I";

if(m === "M1"){
return "IV";
}

if(s === "orofaringe_hpv"){
if(t === "T4" || n === "N3") return "III";
if(t === "T3" || n === "N2") return "II";
return "I";
}

if(s === "tireoide"){
if(t === "T4") return "III/IV";
if(t === "T3" || n !== "N0") return "II";
return "I";
}

if(t === "T4" || n === "N3") return "IV";
if(t === "T3" || n === "N2") return "III";
if(t === "T2") return "II";

return estagio;
}

function condutaPorEstagio(s,estagio,subtipo){
if(s === "tireoide"){
if(subtipo === "dif"){
return "ATA: carcinoma diferenciado. Baixo risco: lobectomia pode ser suficiente. Risco intermediário/alto: tireoidectomia total ± radioiodo e supressão de TSH conforme estratificação.";
}
if(subtipo === "med"){
return "Carcinoma medular: tireoidectomia total + esvaziamento central; avaliar calcitonina, CEA e mutação RET.";
}
return "Carcinoma anaplásico: avaliação urgente; NGS/BRAF, terapia-alvo/imunoterapia/radioterapia; cirurgia apenas se ressecável e útil para controle local.";
}

if(estagio === "I" || estagio === "II"){
return "Tratamento local: cirurgia ou radioterapia conforme sítio, função e ressecabilidade.";
}

if(estagio === "III"){
return "Doença localmente avançada: cirurgia + adjuvância ou quimiorradioterapia definitiva conforme sítio e preservação funcional.";
}

return "Doença avançada/metastática: avaliar ressecabilidade; QT/RT definitiva, terapia sistêmica ou imunoterapia conforme cenário clínico.";
}

function calc(){
let s = el("site").value;
let t = el("T").value;
let n = el("N").value;
let m = el("M").value;
let subtipo = el("subtipo").value;
let ENE = el("ENE").value;
let margem = el("margem").value;

let estagio = calcularEstagio(s,t,n,m);
let conduta = condutaPorEstagio(s,estagio,subtipo);

let alerta = "";

if(ENE === "sim" || margem === "positiva"){
alerta = "<br><br><span class='bad'>⚠ Alto risco: ENE positivo ou margem positiva → considerar quimiorradioterapia adjuvante.</span>";
}
else if(margem === "proxima"){
alerta = "<br><br><span class='bad'>⚠ Margem próxima: considerar radioterapia adjuvante conforme contexto.</span>";
}

el("res").innerHTML =
"<b>" + dados[s].nome + "</b><br><br>" +
"<b>TNM:</b> " + t + " " + n + " " + m + "<br>" +
"<b>Estágio:</b> " + estagio + "<br><br>" +
"<b>O que caracteriza o T:</b><br>" + dados[s].T[t] + "<br><br>" +
"<b>O que caracteriza o N:</b><br>" + dados[s].N[n] + "<br><br>" +
"<b>Conduta sugerida:</b><br>" + conduta +
alerta +
"<p class='small'>Base operacional: AJCC + NCCN + ATA. Ferramenta de apoio; confirmar com guideline oficial, imagem, anatomopatológico, performance status e discussão multidisciplinar.</p>";
}

function copiar(){
calc();
navigator.clipboard.writeText(el("res").innerText);
alert("Copiado para prontuário!");
}

updateOptions();
</script>

</body>
</html>

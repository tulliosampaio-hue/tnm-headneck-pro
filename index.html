<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNM H&N PRO</title>

<style>
body{font-family:Arial;background:#eef2f6;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px}
select,button{width:100%;padding:10px;margin-top:6px;border-radius:8px}
.result{background:#d9edf7;padding:15px;border-radius:10px}
h2{margin-bottom:5px}
.small{font-size:13px;color:#444}
.bad{color:#b00020;font-weight:bold}
</style>
</head>

<body>

<h2>TNM Cabeça e Pescoço PRO</h2>

<div class="card">
<label>Sítio tumoral</label>
<select id="site" onchange="updateOptions()">
<option value="oral">Cavidade oral</option>
<option value="orofaringe">Orofaringe HPV−</option>
<option value="laringe">Laringe</option>
<option value="tireoide">Tireoide</option>
</select>

<label>T</label>
<select id="T"></select>

<label>N</label>
<select id="N"></select>

<label>M</label>
<select id="M">
<option value="M0">M0</option>
<option value="M1">M1</option>
</select>

<label>ENE</label>
<select id="ENE">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<label>Margem</label>
<select id="margem">
<option value="livre">Livre</option>
<option value="proxima">Próxima</option>
<option value="positiva">Positiva</option>
</select>

<button onclick="calc()">Calcular</button>
</div>

<div class="result" id="res"></div>

<script>

const dados = {

oral:{
nome:"CEC Cavidade Oral",
T:{
"T1":"≤2 cm e DOI ≤5mm",
"T2":"≤4 cm ou DOI até 10mm",
"T3":">4 cm ou DOI >10mm",
"T4a":"Invasão de estruturas adjacentes (osso, pele)",
"T4b":"Base do crânio ou carótida"
},
N:{
"N0":"Sem linfonodo",
"N1":"Único ≤3 cm",
"N2":"Múltiplos ou até 6 cm",
"N3":">6 cm ou ENE"
}
},

orofaringe:{
nome:"Orofaringe HPV−",
T:{
"T1":"≤2 cm",
"T2":"≤4 cm",
"T3":">4 cm",
"T4":"Invasão profunda"
},
N:{
"N0":"Sem linfonodo",
"N1":"≤3 cm",
"N2":"Até 6 cm",
"N3":">6 cm ou ENE"
}
},

laringe:{
nome:"Laringe",
T:{
"T1":"Limitado",
"T2":"Extensão local",
"T3":"Fixação",
"T4":"Invasão extensa"
},
N:{
"N0":"Sem linfonodo",
"N1":"≤3 cm",
"N2":"Até 6 cm",
"N3":">6 cm"
}
},

tireoide:{
nome:"Tireoide (ATA atualizado)",
T:{
"T1":"≤2 cm",
"T2":"2–4 cm",
"T3":">4 cm",
"T4":"Extensão extratireoidiana"
},
N:{
"N0":"Sem linfonodo",
"N1a":"Central",
"N1b":"Lateral"
}
}

};

function updateOptions(){
let s=document.getElementById("site").value;
let T=document.getElementById("T");
let N=document.getElementById("N");

T.innerHTML="";
N.innerHTML="";

for(let t in dados[s].T){
T.innerHTML+=`<option value="${t}">${t} - ${dados[s].T[t]}</option>`;
}

for(let n in dados[s].N){
N.innerHTML+=`<option value="${n}">${n} - ${dados[s].N[n]}</option>`;
}
}

function calc(){

let site=document.getElementById("site").value;
let T=document.getElementById("T").value;
let N=document.getElementById("N").value;
let M=document.getElementById("M").value;
let ENE=document.getElementById("ENE").value;
let margem=document.getElementById("margem").value;

let estagio="I";

if(M==="M1"){
estagio="IV";
}
else if(T==="T4"||N==="N3"){
estagio="IV";
}
else if(T==="T3"||N==="N2"){
estagio="III";
}
else if(T==="T2"){
estagio="II";
}

let conduta="";

if(site==="tireoide"){
conduta="ATA: estratificar risco. Baixo risco → lobectomia. Intermediário → total ± radioiodo. Alto risco → total + radioiodo.";
}
else if(estagio==="I"||estagio==="II"){
conduta="Tratamento local: cirurgia ou radioterapia.";
}
else if(estagio==="III"){
conduta="Cirurgia + adjuvância ou QT/RT.";
}
else{
conduta="Doença avançada: QT/RT ou tratamento sistêmico.";
}

let alerta="";
if(ENE==="sim"||margem==="positiva"){
alerta="<br><span class='bad'>⚠ Alto risco → QT/RT obrigatória</span>";
}

document.getElementById("res").innerHTML=
"<b>"+dados[site].nome+"</b><br><br>"+
"<b>Estágio:</b> "+estagio+"<br><br>"+
"<b>T:</b> "+dados[site].T[T]+"<br>"+
"<b>N:</b> "+dados[site].N[N]+"<br><br>"+
"<b>Conduta:</b><br>"+conduta+
alerta+
"<p class='small'>Base: AJCC + NCCN + ATA (atualizações recentes). Uso como apoio clínico.</p>";

}

updateOptions();

</script>

</body>
</html>
